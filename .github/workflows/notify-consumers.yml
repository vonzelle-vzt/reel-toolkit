name: Notify consumers on new tag

# Fires on every annotated or lightweight tag matching v*. For each consumer
# repo (FlagPlay + NextPlay), clones a fresh branch, bumps the
# @vonzelle-vzt/reel-toolkit tarball URL to the new tag, and opens a PR.
# The consumer-repo maintainer reviews + merges → Vercel auto-deploys.
#
# Requires repo secret CONSUMER_REPO_PAT — a fine-grained PAT with:
#   - Contents: Read & Write (clone + push branch)
#   - Pull requests: Read & Write (open PR)
# Scope it to the two consumer repos only: vonzelle-vzt/FlagPlay,
# vonzelle-vzt/nextplay.
#
# Once this lands, the cross-pollination workflow is: edit toolkit → push
# tag → both consumer apps auto-receive a PR within ~1 minute. Merge to
# adopt; close to skip. The maintainer never edits package.json by hand.

on:
  push:
    tags:
      - 'v*'

jobs:
  notify:
    runs-on: ubuntu-latest
    strategy:
      # Don't fail-fast — if FlagPlay's PR open fails, still try NextPlay.
      fail-fast: false
      matrix:
        consumer:
          - { repo: 'vonzelle-vzt/FlagPlay', file: 'apps/web/package.json', name: 'FlagPlay' }
          - { repo: 'vonzelle-vzt/nextplay', file: 'package.json', name: 'NextPlay' }
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Publishing tag: ${TAG}"

      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.consumer.repo }}
          token: ${{ secrets.CONSUMER_REPO_PAT }}
          path: consumer

      - name: Configure git identity
        working-directory: consumer
        run: |
          git config user.name "vzt-toolkit-bot"
          git config user.email "noreply@vonzelle-vzt.com"

      - name: Bump tarball URL in package.json
        id: bump
        working-directory: consumer
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          FILE="${{ matrix.consumer.file }}"
          OLD_URL=$(grep -oE 'https://github.com/vonzelle-vzt/reel-toolkit/archive/refs/tags/v[0-9.]+\.tar\.gz' "$FILE" | head -1 || true)
          NEW_URL="https://github.com/vonzelle-vzt/reel-toolkit/archive/refs/tags/${TAG}.tar.gz"
          if [ -z "$OLD_URL" ]; then
            echo "::warning::No existing toolkit tarball URL found in ${FILE}. Skipping ${{ matrix.consumer.name }}."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$OLD_URL" = "$NEW_URL" ]; then
            echo "Already at ${TAG} in ${FILE} — skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Use Python for the in-place edit so we don't have to worry about
          # sed's BSD/GNU differences (workflow runs on Ubuntu but mirroring
          # to a future macOS runner stays safe).
          python3 -c "
          import sys, pathlib
          p = pathlib.Path('${FILE}')
          s = p.read_text()
          s = s.replace('${OLD_URL}', '${NEW_URL}')
          p.write_text(s)
          "
          echo "old=${OLD_URL}" >> "$GITHUB_OUTPUT"
          echo "new=${NEW_URL}" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.bump.outputs.changed == 'true'
        working-directory: consumer
        env:
          GH_TOKEN: ${{ secrets.CONSUMER_REPO_PAT }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          BRANCH="toolkit/bump-${TAG}"
          # Detect default branch (FlagPlay uses 'main', NextPlay uses 'master').
          DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name')
          git checkout -b "$BRANCH"
          git add "${{ matrix.consumer.file }}"
          git commit -m "chore(deps): bump @vonzelle-vzt/reel-toolkit to ${TAG}

          Auto-generated by reel-toolkit notify-consumers workflow. Bumps the
          tarball URL from ${{ steps.bump.outputs.old }} to ${{ steps.bump.outputs.new }}.

          Review the toolkit changelog before merging:
          https://github.com/vonzelle-vzt/reel-toolkit/releases/tag/${TAG}
          https://github.com/vonzelle-vzt/reel-toolkit/compare/${{ steps.bump.outputs.old }}...${TAG}"
          git push origin "$BRANCH"
          gh pr create \
            --repo "${{ matrix.consumer.repo }}" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "chore(deps): bump @vonzelle-vzt/reel-toolkit to ${TAG}" \
            --body "Auto-PR from reel-toolkit ${TAG} release.

          - **Old:** \`${{ steps.bump.outputs.old }}\`
          - **New:** \`${{ steps.bump.outputs.new }}\`

          The toolkit publishes once and notifies both consumer apps. Review
          the changelog before merging.

          - Release notes: https://github.com/vonzelle-vzt/reel-toolkit/releases/tag/${TAG}
          - Diff: https://github.com/vonzelle-vzt/reel-toolkit/compare/${{ steps.bump.outputs.old }}...${TAG}

          After merge, Vercel auto-deploys the change to ${{ matrix.consumer.name }}. Smoke-pass
          ${{ matrix.consumer.name }}'s critical routes post-deploy.

          Generated by .github/workflows/notify-consumers.yml in the toolkit repo."
